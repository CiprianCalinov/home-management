add_fuel:
  name: Add fuel entry
  description: Log a refuelling for a vehicle.
  fields:
    car_id:
      name: Car ID
      description: The vehicle id (see the Car Manager panel).
      required: true
      example: a1b2c3d4e5f6
      selector:
        text:
    date:
      name: Date
      description: Date of the refuelling (defaults to today).
      example: "2026-06-15"
      selector:
        date:
    liters:
      name: Liters
      required: true
      example: 42.5
      selector:
        number:
          min: 0
          max: 200
          step: 0.01
          mode: box
    price_total:
      name: Total price (RON)
      required: true
      example: 320.50
      selector:
        number:
          min: 0
          step: 0.01
          mode: box
    odometer:
      name: Odometer (km)
      example: 85120
      selector:
        number:
          min: 0
          mode: box
    full:
      name: Full tank
      description: Whether the tank was filled (needed for consumption stats).
      default: true
      selector:
        boolean:
    note:
      name: Note
      selector:
        text:

add_cost:
  name: Add cost entry
  description: Log a cost for a vehicle.
  fields:
    car_id:
      name: Car ID
      required: true
      selector:
        text:
    date:
      name: Date
      example: "2026-06-15"
      selector:
        date:
    category:
      name: Category
      required: true
      selector:
        select:
          options:
            - service
            - combustibil
            - asigurare
            - taxe
            - anvelope
            - altele
    amount:
      name: Amount (RON)
      required: true
      selector:
        number:
          min: 0
          step: 0.01
          mode: box
    note:
      name: Note
      selector:
        text:

refresh:
  name: Refresh
  description: Recompute all Car Manager derived values.

notify_due:
  name: Notify due items
  description: Send a notification listing items due within the threshold.
  fields:
    days:
      name: Threshold (days)
      description: Include items expiring within this many days.
      example: 30
      selector:
        number:
          min: 1
          max: 365
          mode: box
    notify_service:
      name: Notify service
      description: e.g. notify.mobile_app_phone. Falls back to a persistent notification.
      example: notify.mobile_app_phone
      selector:
        text:
